# .github/workflows/maven-ci.yml
name: Java CI com Maven

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user_desafio
          POSTGRES_PASSWORD: password_desafio
          POSTGRES_DB: biblioteca_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build com Maven
        run: mvn -B package --file pom.xml

      - name: Upload do Artifact
        uses: actions/upload-artifact@v4
        with:
          name: biblioteca-app
          path: target/*.jar